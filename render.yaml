services:
  # Express backend
  - type: web
    name: log-dashboard-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://log-dashboard-client.onrender.com  # update after frontend deploys

  # React frontend (static site)
  - type: web
    name: log-dashboard-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://log-dashboard-server.onrender.com  # update after backend deploys
